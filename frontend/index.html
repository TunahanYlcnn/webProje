<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniShare | Giriş & Kayıt</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="giris-kapsayici">
        <div class="giris-kart">
            <header class="giris-baslik">
                <h1>Uni<span>Share</span></h1>
                <p id="alt-metin">Kampüs paylaşımlarına hızlıca ulaş.</p>
            </header>

            <div id="katman-giris" class="form-katmani aktif">
                <form id="giris-formu" class="giris-form">
                    <div class="input-grubu">
                        <i class="fas fa-user"></i>
                        <input type="text" id="giris-kullanici" placeholder="Kullanıcı Adı" required>
                    </div>
                    <div class="input-grubu">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="giris-sifre" placeholder="Şifre" required>
                    </div>
                    <button type="submit" class="ana-btn">Giriş Yap</button>
                    <div class="form-linkler">
                        <a href="#" onclick="katmanDegistir('katman-sifre')">Şifremi Unuttum?</a>
                    </div>
                </form>
                <div class="alt-alan">
                    <span>Hesabın yok mu?</span>
                    <button class="ikincil-btn" onclick="katmanDegistir('katman-kayit')">Kayıt Ol</button>
                </div>
            </div>

            <div id="katman-kayit" class="form-katmani">
                <form id="kayit-formu" class="giris-form">
                    <div class="input-grubu">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="Üniversite E-postası" required>
                    </div>
                    <div class="input-grubu">
                        <i class="fas fa-user-plus"></i>
                        <input type="text" placeholder="Kullanıcı Adı Seç" required>
                    </div>
                    <div class="input-grubu">
                        <i class="fas fa-key"></i>
                        <input type="password" placeholder="Şifre Oluştur" required>
                    </div>
                    <button type="submit" class="ana-btn">Hesap Oluştur</button>
                </form>
                <div class="alt-alan">
                    <span>Zaten üye misin?</span>
                    <button class="ikincil-btn" onclick="katmanDegistir('katman-giris')">Giriş'e Dön</button>
                </div>
            </div>

            <div id="katman-sifre" class="form-katmani">
                <form id="sifre-formu" class="giris-form">
                    <p style="font-size: 0.85rem; color: #7f8c8d; margin-bottom: 15px;">
                        E-posta adresini gir, sana bir kod gönderelim.
                    </p>
                    <div class="input-grubu">
                        <i class="fas fa-paper-plane"></i>
                        <input type="email" placeholder="E-posta Adresini Gir" required>
                    </div>
                    <button type="submit" class="ana-btn">Kod Gönder</button>
                </form>
                <div class="alt-alan">
                    <button class="ikincil-btn" onclick="katmanDegistir('katman-giris')">Geri Dön</button>
                </div>
            </div>

        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
